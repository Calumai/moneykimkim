<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>政府採購每日查標整理</title><style>body{margin:0;background:#f5f7fb;color:#172033;font-family:system-ui,'Noto Sans TC',sans-serif}header{background:#172033;color:white;padding:22px}main{max-width:1180px;margin:auto;padding:22px}section{background:white;border:1px solid #dfe5ef;border-radius:16px;padding:20px;margin-bottom:18px}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:10px;padding:11px;font:inherit}label{font-weight:800;display:block;margin:8px 0 6px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}button{border:0;border-radius:999px;padding:11px 17px;margin:8px 8px 0 0;background:#2457c5;color:white;font-weight:900}.secondary{background:#475569}.danger{background:#a83d3d}.ghost{background:#e2e8f0;color:#172033}.muted{color:#64748b}.hidden{display:none}.ver{display:inline-block;background:#dcfce7;color:#166534;border:1px solid #bbf7d0;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:800}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid #e2e8f0;padding:10px;text-align:left;vertical-align:top}th{background:#f8fafc}.tag{display:inline-block;background:#e2e8f0;border-radius:999px;padding:3px 8px;margin:2px}pre{background:#0f172a;color:#e2e8f0;padding:14px;border-radius:12px;white-space:pre-wrap}@media(max-width:900px){.grid{grid-template-columns:1fr}}textarea{min-height:220px}</style></head><body><header><h1>政府採購每日查標整理</h1><p>MVP：人工貼上政府採購網結果 → 整理 → 寫入 Google Sheet</p></header><main><section id="loginBox"><h2>入口密碼</h2><input id="pw" type="password" placeholder="請輸入密碼"><button onclick="login()">進入</button><p id="loginMsg" class="muted"></p></section><div id="app" class="hidden"><section><h2>每日標案整理</h2><div class="ver">Loop 8.2.0｜2026-06-17 17:55｜MVP 人工貼上整理版</div><p class="muted">請先在政府採購網人工搜尋，再把結果表格文字貼到下方。本工具不自動登入、不自動領標、不自動投標、不自動傳群組。</p><div class="grid"><div><label>公告日期</label><input id="date" type="date"></div><div><label>機關關鍵字</label><input id="agency" value="原住民、客家、花蓮"></div><div><label>標案關鍵字</label><input id="kw" value="族語、網站、教材"></div></div><button onclick="defaults()" class="ghost">帶入預設關鍵字</button><button onclick="test()" class="secondary">測試 Google Sheet 連線</button><button onclick="logout()" class="danger">登出</button><p id="msg" class="muted"></p></section><section><h2>貼上政府採購網結果</h2><textarea id="raw" placeholder="請從政府採購網搜尋結果頁複製表格文字後貼上。支援 Tab 分隔、換行文字；系統會嘗試抓標案名稱、機關、公告日期、截標日期、金額、連結。"></textarea><button onclick="parsePaste()">解析貼上資料</button><button onclick="clearAll()" class="secondary">清空</button></section><section><h2>每日標案清單 <span id="count" class="muted"></span></h2><p id="summary" class="muted">尚未解析。</p><button onclick="writeSheet()">寫入目前清單到 Google Sheet</button><button class="secondary" onclick="copyReport()">複製群組回報文字</button><div style="overflow:auto;max-height:560px"><table><thead><tr><th>勾選</th><th>優先度</th><th>標案名稱</th><th>機關</th><th>公告</th><th>截標</th><th>金額</th><th>命中</th><th>備註</th><th>連結</th></tr></thead><tbody id="rows"></tbody></table></div></section><section><h2>群組回報文字</h2><pre id="report">尚未產生。</pre></section></div></main><script>const GAS_URL='https://script.google.com/macros/s/AKfycbyuRfG2psDqizC3pXcDNAyFMS1DJBF9pMCWCk25hMFyOpa2Yo-A7Dzn2d24rf3O--kB/exec',TOKEN='1234';const defaultAgencies='原住民、客家、原住民族委員會、客家委員會、原住民族語言研究發展基金會、花蓮';const defaultKeywords='族語、客語、客話、拍攝、攝影、教材、數位、網站、AI、影片、動畫、平台、母語、語料、文化、原住民、部落';let tenders=[];function $(id){return document.getElementById(id)}function val(id){return $(id).value.trim()}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function login(){if(val('pw')==='1234'){localStorage.setItem('mk-login','1');show()}else $('loginMsg').textContent='密碼錯誤'}function show(){$('loginBox').classList.add('hidden');$('app').classList.remove('hidden');if(!val('date'))$('date').value=new Date().toISOString().slice(0,10)}function logout(){localStorage.removeItem('mk-login');location.reload()}if(localStorage.getItem('mk-login')==='1')show();function defaults(){$('agency').value=defaultAgencies;$('kw').value=defaultKeywords;$('msg').textContent='已帶入預設關鍵字'}async function test(){try{let d=await (await fetch(GAS_URL)).json();$('msg').textContent=d.ok?'連線成功：後端 '+(d.backendVersion||'未回傳版本')+'｜'+(d.updatedAt||''):'連線失敗：'+JSON.stringify(d)}catch(e){$('msg').textContent='連線失敗：'+e.message}}function clearAll(){$('raw').value='';tenders=[];render();$('msg').textContent='已清空'}function parsePaste(){let raw=val('raw');if(!raw){alert('請先貼上政府採購網結果');return}let rows=raw.includes('\t')?parseTab(raw):parseLoose(raw);tenders=rows.map((r,i)=>classify({...r,id:String(i+1),selected:true,dataStatus:'人工貼上政府採購網結果'}));render();$('msg').textContent='已解析 '+tenders.length+' 筆；請人工確認欄位是否正確'}function parseTab(raw){let lines=raw.split(/\n+/).map(x=>x.trim()).filter(Boolean);return lines.map(line=>line.split('\t')).filter(c=>c.length>=2).map(c=>({title:pickTitle(c),agency:pickAgency(c),publishDate:pickDate(c,0),deadline:pickDate(c,1),budget:pickMoney(c),link:pickLink(c),summary:c.join(' ')})).filter(r=>r.title||r.agency)}function parseLoose(raw){let blocks=raw.split(/\n\s*\n/).map(x=>x.trim()).filter(Boolean);if(blocks.length<2)blocks=raw.split(/\n(?=\d+\s|\D)/).map(x=>x.trim()).filter(Boolean);return blocks.map(b=>{let parts=b.split(/\s{2,}|\n/).filter(Boolean);return{title:pickTitle(parts)||b.slice(0,80),agency:pickAgency(parts),publishDate:pickDate(parts,0),deadline:pickDate(parts,1),budget:pickMoney(parts),link:pickLink(parts),summary:b.slice(0,260)}}).filter(r=>r.title||r.agency)}function pickTitle(c){let bad=/公告|截止|截標|預算|金額|機關|序號|項次/;let best='';c.forEach(x=>{x=String(x||'').trim();if(x.length>best.length&&!bad.test(x)&&!isDate(x)&&!isMoney(x)&&!/^https?:/.test(x))best=x});return best}function pickAgency(c){for(let x of c){if(/(政府|公所|學校|大學|委員會|基金會|局|處|署|部|中心|鄉|鎮|市)/.test(x)&&String(x).length<80)return x}return''}function pickDate(c,n){let arr=[];c.forEach(x=>{let m=String(x).match(/(?:\d{2,3}|\d{4})[\/.-]\d{1,2}[\/.-]\d{1,2}(?:\s*\d{1,2}:\d{2})?/g);if(m)arr.push(...m)});return arr[n]||''}function pickMoney(c){for(let x of c){let m=String(x).match(/\d{1,3}(,\d{3})+|\d{6,}/);if(m&&!isDate(x))return m[0]}return''}function pickLink(c){for(let x of c){let m=String(x).match(/https?:\/\/\S+/);if(m)return m[0]}return''}function isDate(s){return /(?:\d{2,3}|\d{4})[\/.-]\d{1,2}[\/.-]\d{1,2}/.test(String(s))}function isMoney(s){return /\d{1,3}(,\d{3})+|\d{6,}/.test(String(s))}function classify(t){let text=[t.title,t.agency,t.summary].join(' ');let words=[...val('agency').split(/[、,，\s]+/),...val('kw').split(/[、,，\s]+/)].filter(Boolean);let hit=words.filter(w=>text.includes(w));let notes=[];let priority=hit.length?'可觀察':'需人工確認';let n=Number(String(t.budget).replace(/[^0-9]/g,''));if(/維運|維護/.test(text)){priority='低優先';notes.push('維護維運類，先低優先')}if(/系統|資訊|網站|平台|平臺/.test(text)&&n&&n<1000000){priority='低優先';notes.push('資訊系統類且低於100萬')}if(!notes.length&&hit.length)notes.push('命中關鍵字，建議人工檢視');return{...t,priority,matchedKeywords:hit,notes}}function render(){let list=tenders;$('count').textContent='共 '+list.length+' 筆';$('summary').textContent=list.length?'請確認後再寫入 Google Sheet。':'尚未解析。';$('rows').innerHTML=list.map(t=>'<tr><td><input type="checkbox" '+(t.selected?'checked':'')+' onchange="tenders['+tenders.indexOf(t)+'].selected=this.checked"></td><td>'+esc(t.priority)+'</td><td>'+esc(t.title)+'</td><td>'+esc(t.agency)+'</td><td>'+esc(t.publishDate)+'</td><td>'+esc(t.deadline)+'</td><td>'+esc(t.budget)+'</td><td>'+(t.matchedKeywords||[]).map(k=>'<span class="tag">'+esc(k)+'</span>').join('')+'</td><td>'+esc((t.notes||[]).join('；'))+'</td><td>'+(t.link?'<a target="_blank" href="'+esc(t.link)+'">連結</a>':'')+'</td></tr>').join('');$('report').textContent=buildReport(list.filter(t=>t.selected))}function buildReport(list){if(!list.length)return'尚未產生。';return['今日查標整理如下：',...list.map((t,i)=>(i+1)+'. ['+t.priority+'] '+t.title+'｜'+t.agency+'｜公告：'+(t.publishDate||'未填')+'｜截標：'+(t.deadline||'未填')+'｜'+(t.link||''))].join('\n')}function copyReport(){navigator.clipboard.writeText($('report').textContent);alert('已複製回報文字')}async function writeSheet(){let list=tenders.filter(t=>t.selected);if(!list.length)return alert('沒有勾選資料');try{let d=await (await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'write',token:TOKEN,rows:list})})).json();alert(d.ok?'寫入完成：新增 '+d.inserted+' 筆，略過 '+d.skipped+' 筆':'寫入失敗：'+JSON.stringify(d))}catch(e){alert('寫入失敗：'+e.message)}}</script></body></html>

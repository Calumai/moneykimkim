<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>政府採購每日查標整理</title><style>body{margin:0;background:#f5f7fb;color:#172033;font-family:system-ui,'Noto Sans TC',sans-serif}header{background:#172033;color:white;padding:22px}main{max-width:1180px;margin:auto;padding:22px}section{background:white;border:1px solid #dfe5ef;border-radius:16px;padding:20px;margin-bottom:18px}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:10px;padding:11px;font:inherit}label{font-weight:800;display:block;margin:8px 0 6px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}button{border:0;border-radius:999px;padding:11px 17px;margin:8px 8px 0 0;background:#2457c5;color:white;font-weight:900}.secondary{background:#475569}.danger{background:#a83d3d}.ghost{background:#e2e8f0;color:#172033}.muted{color:#64748b}.hidden{display:none}.ver{display:inline-block;background:#e0f2fe;color:#075985;border:1px solid #bae6fd;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:800}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid #e2e8f0;padding:10px;text-align:left;vertical-align:top}th{background:#f8fafc}.tag{display:inline-block;background:#e2e8f0;border-radius:999px;padding:3px 8px;margin:2px}pre{background:#0f172a;color:#e2e8f0;padding:14px;border-radius:12px;white-space:pre-wrap}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:580px){.grid{grid-template-columns:1fr}}</style></head><body><header><h1>政府採購每日查標整理</h1><p>搜尋 → 檢查 → 寫入 Google Sheet｜不自動傳群組</p></header><main><section id="loginBox"><h2>入口密碼</h2><input id="pw" type="password" placeholder="請輸入密碼"><button onclick="login()">進入</button><p id="loginMsg" class="muted"></p></section><div id="app" class="hidden"><section><h2>每日標案搜尋</h2><div class="ver">前端版本：Loop 8.1.4｜2026-06-17 17:42｜已改新 GAS URL</div><p class="muted">已固定連接公司 Apps Script，不需要再填 API 網址。</p><div class="grid"><div><label>公告日期</label><input id="date" type="date"></div><div><label>機關關鍵字</label><input id="agency" value="花蓮"></div><div><label>標案關鍵字</label><input id="kw" value="族語、網站、教材"></div><div><label>優先度</label><select id="pf"><option value="">全部</option><option>可觀察</option><option>低優先</option><option>需人工確認</option></select></div><div><label>資料來源</label><select id="mode"><option value="search">自動搜尋</option><option value="paste">人工貼上備援</option></select></div></div><button onclick="searchTenders()">搜尋標案</button><button class="ghost" onclick="defaults()">帶入預設關鍵字</button><button class="secondary" onclick="test()">測試連線</button><button class="danger" onclick="logout()">登出</button><p id="msg" class="muted"></p></section><section id="pasteBox" class="hidden"><h2>人工貼上備援</h2><textarea id="raw" placeholder="標案名稱&#9;機關名稱&#9;公告日期&#9;截標日期&#9;預算金額&#9;標案連結&#9;摘要"></textarea><button onclick="parsePaste()">解析貼上資料</button></section><section><h2>每日標案清單 <span id="count" class="muted"></span></h2><p id="summary" class="muted">尚未搜尋。</p><button onclick="writeSheet()">寫入目前清單到 Google Sheet</button><button class="secondary" onclick="copyReport()">複製群組回報文字</button><div style="overflow:auto;max-height:560px"><table><thead><tr><th>勾選</th><th>優先度</th><th>標案名稱</th><th>機關</th><th>公告</th><th>截標</th><th>金額</th><th>備註</th><th>連結</th></tr></thead><tbody id="rows"></tbody></table></div></section><section><h2>群組回報文字</h2><pre id="report">尚未產生。</pre></section></div></main><script>const GAS_URL='https://script.google.com/macros/s/AKfycbyuRfG2psDqizC3pXcDNAyFMS1DJBF9pMCWCk25hMFyOpa2Yo-A7Dzn2d24rf3O--kB/exec',TOKEN='1234';let tenders=[];function $(id){return document.getElementById(id)}function val(id){return $(id).value.trim()}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function login(){if(val('pw')==='1234'){localStorage.setItem('mk-login','1');show()}else $('loginMsg').textContent='密碼錯誤'}function show(){$('loginBox').classList.add('hidden');$('app').classList.remove('hidden');if(!val('date'))$('date').value=new Date().toISOString().slice(0,10)}function logout(){localStorage.removeItem('mk-login');location.reload()}if(localStorage.getItem('mk-login')==='1')show();function defaults(){$('agency').value='原住民、客家、原住民族委員會、客家委員會、原住民族語言研究發展基金會';$('kw').value='族語、客語、拍攝、攝影、教材、數位、網站、AI、影片、動畫、平台、母語、語料、文化'}async function test(){try{let d=await (await fetch(GAS_URL)).json();$('msg').textContent=d.ok?'連線成功：後端 '+(d.backendVersion||'未回傳版本')+'｜'+(d.updatedAt||''):'連線失敗：'+JSON.stringify(d)}catch(e){$('msg').textContent='連線失敗：'+e.message}}$('mode').onchange=()=>{$('pasteBox').classList.toggle('hidden',val('mode')!=='paste')};async function searchTenders(){if(val('mode')==='paste'){$('msg').textContent='請貼上資料後解析';return}$('msg').textContent='搜尋中...';let payload={action:'search',token:TOKEN,query:{publishFrom:val('date'),publishTo:val('date'),agencyQuery:val('agency'),keywordQuery:val('kw')}};try{let d=await (await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)})).json();if(!d.ok)throw Error(d.error||JSON.stringify(d));tenders=(d.rows||[]).map((r,i)=>({...r,id:r.id||String(i+1),selected:true,priority:r.priority||'需人工確認'}));render();$('msg').textContent=d.message||'搜尋完成'}catch(e){$('msg').textContent='自動搜尋失敗：'+e.message}}function parsePaste(){tenders=val('raw').split(/\n+/).slice(1).map((l,i)=>{let c=l.split('\t');return{id:String(i+1),title:c[0],agency:c[1],publishDate:c[2],deadline:c[3],budget:c[4],link:c[5],summary:c.slice(6).join(' '),priority:'需人工確認',selected:true}}).filter(x=>x.title);render()}function render(){let list=tenders.filter(x=>!val('pf')||x.priority===val('pf'));$('count').textContent='共 '+list.length+' 筆';$('summary').textContent=list.length?'請確認後再寫入 Google Sheet。':'沒有符合條件的標案。';$('rows').innerHTML=list.map(t=>'<tr><td><input type="checkbox" checked></td><td>'+esc(t.priority)+'</td><td>'+esc(t.title)+'</td><td>'+esc(t.agency)+'</td><td>'+esc(t.publishDate)+'</td><td>'+esc(t.deadline)+'</td><td>'+esc(t.budget)+'</td><td>'+esc((t.notes||[]).join?t.notes.join('；'):(t.notes||''))+'</td><td>'+(t.link?'<a target="_blank" href="'+esc(t.link)+'">連結</a>':'')+'</td></tr>').join('');$('report').textContent=buildReport(list)}$('pf').onchange=render;function buildReport(list=tenders){return list.length?['今日查標整理如下：',...list.map((t,i)=>(i+1)+'. ['+t.priority+'] '+t.title+'｜'+t.agency+'｜截標：'+(t.deadline||'未填')+'｜'+(t.link||''))].join('\n'):'尚未產生。'}function copyReport(){navigator.clipboard.writeText($('report').textContent);alert('已複製回報文字')}async function writeSheet(){let list=tenders.filter(t=>t.selected!==false);if(!list.length)return alert('沒有資料');let d=await (await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'write',token:TOKEN,rows:list})})).json();alert(d.ok?'寫入完成：新增 '+d.inserted+' 筆，略過 '+d.skipped+' 筆':'寫入失敗：'+JSON.stringify(d))}</script></body></html>

<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>政府採購每日查標整理</title>
<style>
body{margin:0;background:#f5f7fb;color:#172033;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif}header{background:#172033;color:#fff;padding:22px 26px}main{max-width:1180px;margin:0 auto;padding:22px}section{background:#fff;border:1px solid #dfe5ef;border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:0 8px 28px rgba(23,32,51,.06)}h1,h2{margin:0 0 14px}.muted{color:#64748b;font-size:14px}.hidden{display:none!important}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}label{display:block;font-weight:800;margin:6px 0}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:10px;padding:11px 12px;font:inherit}textarea{min-height:160px;resize:vertical}button{border:0;border-radius:999px;padding:11px 17px;font-weight:900;cursor:pointer;margin:8px 8px 0 0;background:#2457c5;color:#fff;font:inherit}.secondary{background:#475569}.danger{background:#a83d3d}.ghost{background:#e2e8f0;color:#172033}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;padding:12px;border-radius:12px}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid #e2e8f0;padding:10px;text-align:left;vertical-align:top}th{background:#f8fafc;position:sticky;top:0}.tag{display:inline-block;padding:3px 8px;border-radius:999px;background:#e2e8f0;margin:2px}.priority{font-weight:900}pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:12px;padding:14px;overflow:auto}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}main{padding:14px}table{font-size:12px}}@media(max-width:580px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>政府採購每日查標整理</h1><p>搜尋 → 檢查 → 寫入 Google Sheet｜不自動傳群組</p></header>
<main>
<section id="loginBox"><h2>入口密碼</h2><input id="passwordInput" type="password" placeholder="請輸入密碼" /><button onclick="login()">進入</button><p id="loginMsg" class="muted"></p></section>
<div id="app" class="hidden">
<section>
<h2>每日標案搜尋</h2>
<p class="muted">已固定連接公司 Apps Script，不需要再填 API 網址。</p>
<div class="grid">
<div><label>公告日期起</label><input id="publishFrom" type="date"></div>
<div><label>公告日期迄</label><input id="publishTo" type="date"></div>
<div><label>截標日期起</label><input id="deadlineFrom" type="date"></div>
<div><label>截標日期迄</label><input id="deadlineTo" type="date"></div>
<div><label>機關關鍵字</label><input id="agencyQuery" placeholder="原住民、客家"></div>
<div><label>標案關鍵字</label><input id="keywordQuery" placeholder="族語、網站、教材"></div>
<div><label>優先度</label><select id="priorityFilter"><option value="">全部</option><option>可觀察</option><option>低優先</option><option>需人工確認</option></select></div>
<div><label>資料來源</label><select id="sourceMode"><option value="search">自動搜尋</option><option value="paste">人工貼上備援</option></select></div>
</div>
<button onclick="searchTenders()">搜尋標案</button><button class="ghost" onclick="useDefaultKeywords()">帶入預設關鍵字</button><button class="secondary" onclick="testConnection()">測試連線</button><button class="danger" onclick="logout()">登出</button>
<p id="searchMsg" class="muted"></p>
</section>
<section id="pasteBox" class="hidden"><h2>人工貼上備援</h2><p class="muted">自動搜尋如果受政府採購網限制，可以先用這裡貼上結果。</p><textarea id="rawInput" placeholder="標案名稱&#9;機關名稱&#9;公告日期&#9;截標日期&#9;預算金額&#9;標案連結&#9;摘要"></textarea><button onclick="parseInput()">解析貼上資料</button><button class="secondary" onclick="loadExample()">載入範例</button></section>
<section><h2>每日標案清單 <span id="count" class="muted"></span></h2><div id="summary" class="muted">尚未搜尋。</div><p><button onclick="writeFilteredToSheet()">寫入目前清單到 Google Sheet</button><button class="secondary" onclick="copyReport()">複製群組回報文字</button></p><div style="overflow:auto;max-height:560px"><table><thead><tr><th>勾選</th><th>優先度</th><th>標案名稱</th><th>機關</th><th>公告</th><th>截標</th><th>金額</th><th>命中關鍵字</th><th>備註</th><th>連結</th></tr></thead><tbody id="rows"></tbody></table></div></section>
<section><h2>群組回報文字</h2><pre id="report">尚未產生。</pre></section>
</div>
</main>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbzOvQb-fB2b2VtzANjd95_j6pwBlfmaDUHBFV9G80zxob1fGqivn0etEtfD_3TVzCX_/exec';
const APP_PASSWORD='1234';
const API_TOKEN='1234';
const defaultAgencies='原住民、客家、原住民族委員會、客家委員會、原住民族語言研究發展基金會';
const defaultKeywords='族語、客語、客話、拍攝、攝影、澎湖、馬祖、閩南、台語、教材、數位、網站、AI、影片、動畫、平台、母語、語料、文化、阿美、泰雅、排灣、魯凱、布農、達悟、撒奇萊雅、卡那卡那富、拉阿魯哇、西拉雅';
const agencyKeywords=['原住民','原住民族','客家','客家委員會','原住民族委員會','原住民族語言研究發展基金會'];
const tenderKeywords=['族語','客語','客話','拍攝','攝影','澎湖','馬祖','福州話','閩南','閩東','閩語','台語','臺語','鄉土','傳統','部落','繪本','系統','AI','網站','本土','影片','節目','動畫','教材','數位','印','語言','語料','資訊','資料','建置','文化','平台','平臺','母語','音樂','歌曲','歌謠','聲音','採集','有聲書','電子書','阿美','泰雅','賽夏','邵族','賽德克','布農','排灣','魯凱','太魯閣','噶瑪蘭','鄒族','卑南','雅美','達悟','撒奇萊雅','卡那卡那富','拉阿魯哇','西拉雅'];
let tenders=[];
function login(){const v=document.getElementById('passwordInput').value;if(v===APP_PASSWORD){localStorage.setItem('procurement-login','yes');showApp()}else document.getElementById('loginMsg').textContent='密碼錯誤'}
function logout(){localStorage.removeItem('procurement-login');location.reload()}
function showApp(){document.getElementById('loginBox').classList.add('hidden');document.getElementById('app').classList.remove('hidden');loadSettings();initDates();togglePaste()}
if(localStorage.getItem('procurement-login')==='yes')showApp();
function initDates(){const d=new Date();const iso=d.toISOString().slice(0,10);if(!val('publishFrom'))document.getElementById('publishFrom').value=iso;if(!val('publishTo'))document.getElementById('publishTo').value=iso}
function saveSettings(){['publishFrom','publishTo','deadlineFrom','deadlineTo','agencyQuery','keywordQuery'].forEach(id=>localStorage.setItem('procurement-'+id,val(id)));document.getElementById('searchMsg').textContent='已儲存搜尋設定。'}
function loadSettings(){['publishFrom','publishTo','deadlineFrom','deadlineTo','agencyQuery','keywordQuery'].forEach(id=>{document.getElementById(id).value=localStorage.getItem('procurement-'+id)||''});if(!val('agencyQuery'))document.getElementById('agencyQuery').value=defaultAgencies;if(!val('keywordQuery'))document.getElementById('keywordQuery').value=defaultKeywords}
function useDefaultKeywords(){document.getElementById('agencyQuery').value=defaultAgencies;document.getElementById('keywordQuery').value=defaultKeywords;saveSettings()}
document.getElementById('sourceMode')?.addEventListener('change',togglePaste);function togglePaste(){document.getElementById('pasteBox').classList.toggle('hidden',document.getElementById('sourceMode').value!=='paste')}
async function testConnection(){try{const res=await fetch(GAS_URL);const data=await res.json();document.getElementById('searchMsg').textContent=data.ok?'連線成功':'連線失敗：'+JSON.stringify(data)}catch(e){document.getElementById('searchMsg').textContent='連線失敗：'+e.message}}
async function searchTenders(){saveSettings();togglePaste();if(document.getElementById('sourceMode').value==='paste'){document.getElementById('searchMsg').textContent='請在下方貼上資料後按「解析貼上資料」。';return}document.getElementById('searchMsg').textContent='搜尋中...';try{const payload={action:'search',token:API_TOKEN,query:{publishFrom:val('publishFrom'),publishTo:val('publishTo'),deadlineFrom:val('deadlineFrom'),deadlineTo:val('deadlineTo'),agencyQuery:val('agencyQuery'),keywordQuery:val('keywordQuery')}};const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)});const data=await res.json();if(!data.ok)throw new Error(data.error||JSON.stringify(data));tenders=(data.rows||[]).map((t,i)=>classify({...t,id:t.id||String(i+1).padStart(3,'0'),selected:true}));render();document.getElementById('searchMsg').textContent=data.message||'搜尋完成。'}catch(e){document.getElementById('searchMsg').textContent='自動搜尋失敗：'+e.message+'。可切換資料來源為人工貼上備援。'}}
function loadExample(){document.getElementById('rawInput').value='標案名稱\t機關名稱\t公告日期\t截標日期\t預算金額\t標案連結\t摘要\n族語教材數位平台建置案\t原住民族委員會\t2026-06-17\t2026-06-30\t2500000\thttps://example.com/tender-1\t測試資料，非實際政府採購網標案\n網站維護與系統維運案\t客家委員會\t2026-06-17\t2026-06-28\t800000\thttps://example.com/tender-2\t測試資料，非實際政府採購網標案'}
function parseInput(){const raw=document.getElementById('rawInput').value.trim();if(!raw)return alert('請先貼上標案資料');tenders=(raw.includes('\t')?parseTable(raw):parseFieldBlocks(raw)).map((t,i)=>classify({...t,id:t.id||String(i+1).padStart(3,'0'),selected:true}));render();document.getElementById('searchMsg').textContent='已解析貼上資料。'}
function parseTable(raw){const lines=raw.split(/\n+/).filter(Boolean);const start=lines[0].includes('標案名稱')?1:0;return lines.slice(start).map(line=>{const c=line.split('\t');return{title:c[0]||'',agency:c[1]||'',publishDate:c[2]||'',deadline:c[3]||'',budget:c[4]||'',link:c[5]||'',summary:c.slice(6).join(' ')||''}}).filter(t=>t.title||t.agency)}
function parseFieldBlocks(raw){return raw.split(/\n\s*\n/).map(block=>{const t={};block.split(/\n/).forEach(line=>{const m=line.match(/^([^：:]+)[：:](.*)$/);if(!m)return;const k=m[1].trim(),v=m[2].trim();if(k.includes('標案名稱'))t.title=v;else if(k.includes('機關'))t.agency=v;else if(k.includes('公告'))t.publishDate=v;else if(k.includes('截標'))t.deadline=v;else if(k.includes('預算')||k.includes('金額'))t.budget=v;else if(k.includes('連結'))t.link=v;else if(k.includes('摘要'))t.summary=v});return t}).filter(t=>t.title||t.agency)}
function classify(t){const text=[t.title,t.agency,t.summary].join(' ');const matched=[...agencyKeywords,...tenderKeywords].filter(k=>text.includes(k));const notes=[];let priority=matched.length?'可觀察':'需人工確認';const n=Number(String(t.budget).replace(/[^0-9]/g,''));if(/維運|維護/.test(text)){notes.push('維運／維護類，可能已有原廠商');priority='低優先'}if(/系統|資訊|網站|平台|平臺/.test(text)&&n&&n<1000000){notes.push('資訊系統類且低於 100 萬，先低優先');priority='低優先'}if(/原廠授權|授權書/.test(text)){notes.push('可能需要原廠授權書，需人工確認');priority='低優先'}if(!notes.length&&matched.length)notes.push('命中關鍵字，建議人工檢視');return{...t,dataStatus:t.dataStatus||'搜尋結果',matchedKeywords:t.matchedKeywords&&t.matchedKeywords.length?t.matchedKeywords:matched,notes:t.notes&&t.notes.length?t.notes:notes,priority:t.priority||priority}}
function filtered(){const pf=val('priorityFilter');return tenders.filter(t=>!pf||t.priority===pf)}
function render(){const list=filtered();document.getElementById('count').textContent=`共 ${list.length} 筆`;document.getElementById('summary').textContent=list.length?'請確認後再寫入 Google Sheet。':'沒有符合條件的標案。';document.getElementById('rows').innerHTML=list.map(t=>`<tr><td><input type="checkbox" ${t.selected!==false?'checked':''} onchange="tenders[${tenders.indexOf(t)}].selected=this.checked"></td><td class="priority">${esc(t.priority)}</td><td>${esc(t.title)}</td><td>${esc(t.agency)}</td><td>${esc(t.publishDate)}</td><td>${esc(t.deadline)}</td><td>${esc(t.budget)}</td><td>${(t.matchedKeywords||[]).map(k=>`<span class="tag">${esc(k)}</span>`).join('')}</td><td>${esc((t.notes||[]).join('；'))}</td><td>${t.link?`<a href="${esc(t.link)}" target="_blank">連結</a>`:''}</td></tr>`).join('');document.getElementById('report').textContent=buildReport(list)}
document.getElementById('priorityFilter')?.addEventListener('change',render);
function buildReport(list=filtered().filter(t=>t.selected!==false)){if(!list.length)return'尚未產生。';return['今日查標整理如下：',...list.map((t,i)=>`${i+1}. [${t.priority}] ${t.title}｜${t.agency}｜截標：${t.deadline||'未填'}｜${t.link||''}`)].join('\n')}
function copyReport(){navigator.clipboard.writeText(document.getElementById('report').textContent);alert('已複製回報文字')}
async function writeFilteredToSheet(){const list=filtered().filter(t=>t.selected!==false);if(!list.length)return alert('沒有勾選資料');saveSettings();try{const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'write',token:API_TOKEN,rows:list})});const data=await res.json();alert(data.ok?`寫入完成：新增 ${data.inserted} 筆，略過 ${data.skipped} 筆`:'寫入失敗：'+JSON.stringify(data))}catch(e){alert('寫入失敗：'+e.message)}}
function val(id){return document.getElementById(id).value.trim()}function esc(s){return String(s||'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]))}
</script>
</body>
</html>
